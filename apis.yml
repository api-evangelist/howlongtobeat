aid: howlongtobeat
name: HowLongToBeat
description: HowLongToBeat is a game completion time database that tracks how long
  it takes to finish thousands of video games. Community-sourced data provides average
  completion times across multiple play styles including main story, main story plus
  extras, completionist, and all styles. The site is owned by IGN Entertainment (Ziff
  Davis) and does not publish an official public API; all programmatic access relies
  on community-built wrappers that query the website directly.

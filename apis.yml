apis:
  - aid: howlongtobeat:howlongtobeat-api
    name: HowLongToBeat API
    description: Community-accessible interface to HowLongToBeat game completion time
      data. Provides search-by-game-name and game-detail lookups returning main story,
      main story plus extras, completionist, and all-styles average times in hours
      for thousands of video games. No official API key or authentication is required;
      access is via community wrappers that scrape or proxy the howlongtobeat.com
      website.
